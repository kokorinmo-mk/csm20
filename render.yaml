services:
  - type: web
    name: csm-recommendations
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --timeout 120 --workers 1
    plan: free
    envVars:
      - key: QWEN_API_KEY
        sync: false   # задаётся вручную в Render Dashboard
